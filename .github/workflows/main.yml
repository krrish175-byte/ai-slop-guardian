name: AI Slop Guardian CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      run: |
        cd services/analysis-engine
        pip install -r requirements.txt

    - name: Set up Node.js
      uses: actions/node-version@v4
      with:
        node-version: '20'

    - name: Install Node dependencies
      run: npm install

    - name: Build Monorepo
      run: npm run build
