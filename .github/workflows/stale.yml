name: 'Close stale issues and PRs'

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions.'
          stale-pr-message: 'This pull request has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Please comment if you want to keep it open.'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,good first issue'
          exempt-pr-labels: 'pinned,dependencies'
          days-before-stale: 14
          days-before-close: 7
